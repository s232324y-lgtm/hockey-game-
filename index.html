<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аккаунт</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #3f5fa8;
  font-family: Arial;
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  backdrop-filter: blur(10px);
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
  font-size: 16px;
}

.reg { background: #4CAF50; }
.log { background: #3b6ef5; }

#status {
  margin-top: 10px;
  color: white;
}
</style>
</head>

<body>

<div class="box">
  <h2>Аккаунт</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Пароль">

  <button class="reg" onclick="register()">Регистрация</button>
  <button class="log" onclick="login()">Войти</button>

  <div id="status"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBwGSDeMOoyDtLiOPGNED7GiWRK9J8UWkg",
  authDomain: "ded-shop-921c6.firebaseapp.com",
  projectId: "ded-shop-921c6",
  storageBucket: "ded-shop-921c6.firebasestorage.app",
  messagingSenderId: "168352739870",
  appId: "1:168352739870:web:408cbe3cd7afa1df34740f",
  measurementId: "G-FKRK4R6JJN"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function status(text) {
  document.getElementById("status").innerText = text;
}

// регистрация
function register() {
  const email = emailInput();
  const pass = passInput();

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => status("Регистрация успешна ✅"))
    .catch(e => status(e.message));
}

// вход
function login() {
  const email = emailInput();
  const pass = passInput();

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => status("Вход выполнен ✅"))
    .catch(e => status(e.message));
}

function emailInput() {
  return document.getElementById("email").value;
}

function passInput() {
  return document.getElementById("pass").value;
}
</script>

</body>
</html>
