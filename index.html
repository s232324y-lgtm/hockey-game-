<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Аккаунт</title>
  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .reg { background: #4CAF50; }
    .login { background: #3b82f6; }

    #status {
      margin-top: 10px;
      color: white;
    }
  </style>
</head>
<body>

<div class="box">
  <h2 style="color:white;">Аккаунт</h2>
  
  <input id="email" type="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Пароль">

  <button class="reg" onclick="register()">Регистрация</button>
  <button class="login" onclick="login()">Войти</button>

  <div id="status"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBwGSDeMOoyDtLiOPGNED7GiWRK9J8UWkg",
  authDomain: "ded-shop-921c6.firebaseapp.com",
  projectId: "ded-shop-921c6"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function status(text) {
  document.getElementById("status").innerText = text;
}

// регистрация
function register() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => status("Регистрация успешна ✅"))
    .catch(e => status(e.message));
}

// вход
function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => status("Вход выполнен ✅"))
    .catch(e => status(e.message));
}

// проверка
auth.onAuthStateChanged(user => {
  if (user) {
    console.log("Вошёл:", user.email);
  } else {
    console.log("Не вошёл");
  }
});
</script>

</body>
</html>
