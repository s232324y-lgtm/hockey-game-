<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🏒 Hockey Online</title>

<style>
body {
  margin:0;
  background:#0f2027;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas {
  background:#cce7ff;
  display:block;
  margin:10px auto;
  border-radius:10px;
  touch-action: none;
}
</style>
</head>

<body>

<h2>🏒 Hockey Game</h2>
<canvas id="game" width="800" height="400"></canvas>
<div id="score">0 : 0</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:100,y:200,r:20};
let enemy = {x:700,y:200,r:20};
let puck = {x:400,y:200,vx:0,vy:0,r:10};

let score1=0, score2=0;

const scoreEl = document.getElementById("score");

// 🔥 МГНОВЕННОЕ УПРАВЛЕНИЕ
canvas.addEventListener("touchstart", move);
canvas.addEventListener("touchmove", move);

function move(e){
  const rect = canvas.getBoundingClientRect();
  player.x = e.touches[0].clientX - rect.left;
  player.y = e.touches[0].clientY - rect.top;
}

// ⚡ БЫСТРЫЙ AI
function ai(){
  enemy.y += (puck.y - enemy.y)*0.2;
}

// 💥 ФИЗИКА БЕЗ ЛАГОВ
function physics(){

  collide(player);
  collide(enemy);

  puck.x += puck.vx;
  puck.y += puck.vy;

  // ускорение
  puck.vx *= 0.99;
  puck.vy *= 0.99;

  // стены
  if(puck.y < 0 || puck.y > 400) puck.vy *= -1;

  // гол
  if(puck.x < 0){
    score2++;
    reset();
  }
  if(puck.x > 800){
    score1++;
    reset();
  }
}

function collide(p){
  let dx = puck.x - p.x;
  let dy = puck.y - p.y;
  let dist = Math.hypot(dx,dy);

  if(dist < p.r + puck.r){
    let angle = Math.atan2(dy,dx);
    puck.vx = Math.cos(angle)*8;
    puck.vy = Math.sin(angle)*8;
  }
}

function reset(){
  puck.x=400; puck.y=200;
  puck.vx=0; puck.vy=0;

  scoreEl.innerText = score1 + " : " + score2;
}

// 🎨 РЕНДЕР
function draw(){
  ctx.clearRect(0,0,800,400);

  ctx.strokeRect(0,0,800,400);

  ctx.fillRect(0,150,10,100);
  ctx.fillRect(790,150,10,100);

  drawCircle(player,"red");
  drawCircle(enemy,"blue");
  drawCircle(puck,"black");
}

function drawCircle(o,color){
  ctx.beginPath();
  ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
}

// 🚀 60 FPS
function loop(){
  ai();
  physics();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
