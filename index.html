<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:system-ui;
  background:#0f2027;
  color:#fff;
}

/* layout */
.app{display:flex;flex-direction:column;height:100vh;}

.header{
  padding:15px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

.nav button{margin-left:5px;}

.main{flex:1;overflow:auto;padding:15px;}

.page{display:none;}
.page.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:10px;
}

.card{
  background:#1b2a34;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff9800;
  color:#fff;
}

input{
  padding:10px;
  margin:5px 0;
  width:100%;
  border:none;
  border-radius:8px;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,0.7);
  align-items:center;
  justify-content:center;
}

.modal.show{display:flex;}

.box{
  background:#222;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <div>🔥 ULTRA APP</div>
    <div class="nav">
      <button onclick="go('home')">Главная</button>
      <button onclick="go('profile')">Профиль</button>
      <button onclick="go('donate')">Донат</button>
      <button onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="main">

    <!-- LOGIN -->
    <div id="auth" class="page active">
      <h2>Регистрация / Вход</h2>

      <div class="card">
        <input id="login" placeholder="Логин">
        <input id="pass" placeholder="Пароль" type="password">

        <button onclick="register()">Регистрация</button>
        <button onclick="login()">Вход</button>
      </div>
    </div>

    <!-- HOME -->
    <div id="home" class="page">
      <h2>Главная</h2>
      <div class="grid" id="news"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="page">
      <h2>Профиль</h2>
      <div class="card" id="profileData"></div>
    </div>

    <!-- DONATE -->
    <div id="donate" class="page">
      <h2>Донат</h2>
      <div class="grid" id="donateList"></div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">
    <h3 id="text"></h3>
    <button onclick="closeModal()">Ок</button>
  </div>
</div>

<script>

// ===== ДАННЫЕ =====
const app = {
  news:["🔥 Обновление","⚡ Новое","🎮 Режим","💻 Онлайн"],
  prices:[100,200,250,500,550]
};

// ===== НАВИГАЦИЯ =====
function go(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== СОХРАНЕНИЕ =====
function saveUser(user){
  localStorage.setItem("user", JSON.stringify(user));
}

function getUser(){
  return JSON.parse(localStorage.getItem("user"));
}

// ===== РЕГИСТРАЦИЯ =====
function register(){
  const login = document.getElementById("login").value;
  const pass = document.getElementById("pass").value;

  if(!login || !pass) return show("Заполни всё");

  const user = {
    login,
    pass,
    level:1,
    coins:0
  };

  saveUser(user);
  show("Аккаунт создан");
}

// ===== ВХОД =====
function login(){
  const login = document.getElementById("login").value;
  const pass = document.getElementById("pass").value;

  const user = getUser();

  if(!user) return show("Нет аккаунта");

  if(user.login === login && user.pass === pass){
    show("Вход успешен");
    loadApp();
  } else {
    show("Ошибка");
  }
}

// ===== ВЫХОД =====
function logout(){
  localStorage.removeItem("user");
  go("auth");
}

// ===== ЗАГРУЗКА =====
function loadApp(){
  go("home");
  render();
}

// ===== РЕНДЕР =====
function render(){

  // новости
  const news = document.getElementById("news");
  news.innerHTML="";
  app.news.forEach(n=>{
    news.innerHTML += `<div class="card">${n}</div>`;
  });

  // профиль
  const user = getUser();
  document.getElementById("profileData").innerHTML = `
    <p>Имя: ${user.login}</p>
    <p>Уровень: ${user.level}</p>
    <p>Монеты: ${user.coins}</p>
  `;

  // донат
  const donate = document.getElementById("donateList");
  donate.innerHTML="";
  app.prices.forEach(p=>{
    donate.innerHTML += `
      <div class="card">
        <div>${p}₽</div>
        <button onclick="pay(${p})">Купить</button>
      </div>
    `;
  });
}

// ===== ДОНАТ (фейк) =====
function pay(amount){
  let user = getUser();
  user.coins += amount;
  saveUser(user);
  render();
  show("Начислено: "+amount);
}

// ===== МОДАЛКА =====
function show(t){
  document.getElementById("text").innerText=t;
  document.getElementById("modal").classList.add("show");
}

function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

// авто вход
if(getUser()){
  loadApp();
}

</script>
