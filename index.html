
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🏒 Ultra Hockey</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family:Arial;
}

canvas{
  background:#0b1c24;
  border-radius:20px;
  box-shadow:0 0 30px black;
}
#menu{
  position:absolute;
  top:20px;
}
button{
  padding:10px;
  margin:5px;
}
</style>
</head>

<body>

<div id="menu">
  <button onclick="mode='bot'">🤖 С ботом</button>
  <button onclick="mode='pvp'">👥 2 игрока</button>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = "bot";

// 🔊 звук
function hitSound(){
  let ctxAudio = new (window.AudioContext||window.webkitAudioContext)();
  let osc = ctxAudio.createOscillator();
  osc.connect(ctxAudio.destination);
  osc.start();
  osc.stop(ctxAudio.currentTime+0.05);
}

// 🐱 персонажи
let p1 = {x:150,y:250,r:25,color:"orange"}; // карамелька
let p2 = {x:750,y:250,r:25,color:"blue"};   // коржик

// шайба
let puck = {x:450,y:250,vx:0,vy:0,r:12};

let score1=0, score2=0;

// управление
let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// движение игроков
function move(){
  // игрок 1 (WASD)
  if(keys["w"]) p1.y-=5;
  if(keys["s"]) p1.y+=5;
  if(keys["a"]) p1.x-=5;
  if(keys["d"]) p1.x+=5;

  // игрок 2 (стрелки)
  if(mode==="pvp"){
    if(keys["ArrowUp"]) p2.y-=5;
    if(keys["ArrowDown"]) p2.y+=5;
    if(keys["ArrowLeft"]) p2.x-=5;
    if(keys["ArrowRight"]) p2.x+=5;
  }

  // бот
  if(mode==="bot"){
    p2.y += (puck.y - p2.y)*0.1;
  }

  // границы (ничего не вылетает)
  clamp(p1);
  clamp(p2);
}

function clamp(p){
  p.x=Math.max(p.r,Math.min(900-p.r,p.x));
  p.y=Math.max(p.r,Math.min(500-p.r,p.y));
}

// физика
function physics(){
  collide(p1);
  collide(p2);

  puck.x+=puck.vx;
  puck.y+=puck.vy;

  puck.vx*=0.99;
  puck.vy*=0.99;

  // стены
  if(puck.y<0||puck.y>500) puck.vy*=-1;

  // гол
  if(puck.x<0){
    score2++;
    reset();
  }
  if(puck.x>900){
    score1++;
    reset();
  }
}

function collide(p){
  let dx=puck.x-p.x;
  let dy=puck.y-p.y;
  let dist=Math.hypot(dx,dy);

  if(dist<p.r+puck.r){
    let angle=Math.atan2(dy,dx);
    puck.vx=Math.cos(angle)*10;
    puck.vy=Math.sin(angle)*10;
    hitSound();
  }
}

function reset(){
  puck.x=450;
  puck.y=250;
  puck.vx=0;
  puck.vy=0;
}

// рисование
function draw(){
  ctx.clearRect(0,0,900,500);

  // поле
  ctx.strokeStyle="white";
  ctx.strokeRect(0,0,900,500);

  // ворота
  ctx.fillRect(0,180,10,140);
  ctx.fillRect(890,180,10,140);

  // игроки
  drawCircle(p1,p1.color);
  drawCircle(p2,p2.color);

  // шайба
  drawCircle(puck,"white");

  // счёт
  ctx.font="30px Arial";
  ctx.fillText(score1+" : "+score2,420,40);
}

function drawCircle(o,color){
  ctx.beginPath();
  ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
}

// цикл
function loop(){
  move();
  physics();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
