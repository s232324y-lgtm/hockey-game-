<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.reg { background: #00c853; }
.login { background: #2962ff; }

#status {
  margin-top: 15px;
}
</style>

</head>
<body>

<div class="box">
  <h2>Аккаунт</h2>

  <input id="email" placeholder="Почта">
  <input id="pass" type="password" placeholder="Пароль">

  <button class="reg" onclick="register()">Регистрация</button>
  <button class="login" onclick="login()">Войти</button>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// ⚠️ ВСТАВЬ СЮДА СВОЙ firebaseConfig
const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "ТВОЙ_PROJECT.firebaseapp.com",
  projectId: "ТВОЙ_PROJECT",
  appId: "ТВОЙ_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// регистрация
window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if (!email || !pass) {
    status("Введите данные");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    status("Аккаунт создан ✅");
  } catch (e) {
    status(e.message);
  }
};

// вход
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    status("Вход выполнен ✅");
  } catch (e) {
    status("Ошибка входа ❌");
  }
};

// проверка авторизации
onAuthStateChanged(auth, (user) => {
  if (user) {
    status("Ты уже вошёл: " + user.email);
  }
});

function status(text){
  document.getElementById("status").innerText = text;
}
</script>
