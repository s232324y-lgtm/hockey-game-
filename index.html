<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аккаунт</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #3b5998;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

.reg { background: #4CAF50; }
.login { background: #4a6edb; }

#status {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Аккаунт</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Пароль">

  <button class="reg" onclick="register()">Регистрация</button>
  <button class="login" onclick="login()">Войти</button>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 ТВОЯ КОНФИГУРАЦИЯ (я вставил с фото)
const firebaseConfig = {
  apiKey: "AIzaSyBwGSDeMO0yDtLiOPGNED7GiWRK9J8UWkg",
  authDomain: "ded-shop-921c6.firebaseapp.com",
  projectId: "ded-shop-921c6",
  storageBucket: "ded-shop-921c6.appspot.com",
  messagingSenderId: "168352739870",
  appId: "1:168352739870:web:408cbe3cd7afa1df34740f",
  measurementId: "G-FKRK4R6JJN"
};

// запуск
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// статус
function status(text) {
  document.getElementById("status").innerText = text;
}

// регистрация
window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    status("✅ Регистрация успешна");
  } catch (e) {
    status("❌ " + e.message);
  }
};

// вход
window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    status("✅ Вход выполнен");
  } catch (e) {
    status("❌ " + e.message);
  }
};
</script>

</body>
</html>
