<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🏒 Hockey Game</title>

<style>
body {
  margin:0;
  background:#0f2027;
  color:white;
  text-align:center;
  font-family:Arial;
}

canvas {
  background:#cce7ff;
  display:block;
  margin:20px auto;
  border-radius:10px;
}

#ui {
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🏒 Hockey Game</h2>

<canvas id="game" width="800" height="400"></canvas>

<div id="ui">
  <div id="score">0 : 0</div>
  <div id="elo">ELO: 1000</div>
</div>

<audio id="hit" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:100,y:200,r:20};
let enemy = {x:700,y:200,r:20};

let puck = {x:400,y:200,vx:0,vy:0,r:10};

let score1 = 0;
let score2 = 0;
let elo = 1000;

const scoreEl = document.getElementById("score");
const eloEl = document.getElementById("elo");
const sound = document.getElementById("hit");

// управление пальцем
canvas.addEventListener("touchmove", e=>{
  let rect = canvas.getBoundingClientRect();
  player.x = e.touches[0].clientX - rect.left;
  player.y = e.touches[0].clientY - rect.top;
});

// простейший AI
function ai(){
  enemy.y += (puck.y - enemy.y)*0.05;
}

// физика
function physics(){
  let dx = puck.x - player.x;
  let dy = puck.y - player.y;
  let dist = Math.hypot(dx,dy);

  if(dist < player.r + puck.r){
    puck.vx = dx*0.4;
    puck.vy = dy*0.4;
    sound.play();
  }

  dx = puck.x - enemy.x;
  dy = puck.y - enemy.y;
  dist = Math.hypot(dx,dy);

  if(dist < enemy.r + puck.r){
    puck.vx = dx*0.4;
    puck.vy = dy*0.4;
  }

  puck.x += puck.vx;
  puck.y += puck.vy;

  puck.vx *= 0.98;
  puck.vy *= 0.98;

  // стены
  if(puck.y < 0 || puck.y > 400) puck.vy *= -1;

  // голы
  if(puck.x < 0){
    score2++;
    reset();
  }
  if(puck.x > 800){
    score1++;
    reset();
  }
}

// сброс после гола
function reset(){
  puck.x = 400;
  puck.y = 200;
  puck.vx = 0;
  puck.vy = 0;

  elo += 10;
  scoreEl.innerText = score1 + " : " + score2;
  eloEl.innerText = "ELO: " + elo;

  if(score1 === 5){
    alert("ПОБЕДА!");
    score1 = 0;
    score2 = 0;
  }
}

// рисуем
function draw(){
  ctx.clearRect(0,0,800,400);

  // поле
  ctx.strokeRect(0,0,800,400);

  // ворота
  ctx.fillRect(0,150,10,100);
  ctx.fillRect(790,150,10,100);

  // игрок
  ctx.beginPath();
  ctx.arc(player.x,player.y,20,0,Math.PI*2);
  ctx.fillStyle="red";
  ctx.fill();

  // бот
  ctx.beginPath();
  ctx.arc(enemy.x,enemy.y,20,0,Math.PI*2);
  ctx.fillStyle="blue";
  ctx.fill();

  // шайба
  ctx.beginPath();
  ctx.arc(puck.x,puck.y,10,0,Math.PI*2);
  ctx.fillStyle="black";
  ctx.fill();
}

// цикл игры
function loop(){
  ai();
  physics();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
