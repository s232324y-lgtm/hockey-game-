<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аккаунт</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#3a4f7a,#2b3f66);
  color:white;
}

.card {
  width:320px;
  margin:100px auto;
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.green { background:#5cb85c; }
.blue { background:#4c79d3; }
.red { background:#d9534f; }

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="authBox">
  <h2>Аккаунт</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Пароль">

  <button class="green" onclick="register()">Регистрация</button>
  <button class="blue" onclick="login()">Войти</button>

  <p id="status"></p>
</div>

<!-- ЛИЧНЫЙ КАБИНЕТ -->
<div class="card hidden" id="cabinet">
  <h2>Личный кабинет</h2>

  <p>Баланс: <b id="balance">0</b> ₽</p>

  <button class="green" onclick="showPay()">Пополнить</button>
  <button class="blue" onclick="showShop()">Товары</button>
  <button class="red" onclick="logout()">Выйти</button>

  <div id="payBox" class="hidden">
    <h3>Пополнение</h3>
    <input id="card" placeholder="Номер карты">
    <input id="date" placeholder="MM/YY">
    <input id="cvv" placeholder="CVV">
    <input id="amount" placeholder="Сумма">

    <button class="green" onclick="pay()">Оплатить</button>
  </div>

  <div id="shopBox" class="hidden">
    <h3>Магазин</h3>

    <button onclick="buy(50)">Купить товар - 50₽</button>
    <button onclick="buy(100)">Купить товар - 100₽</button>
    <button onclick="buy(200)">Купить товар - 200₽</button>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwGSDeMOOyDtLiOPGNED7GiWRK9J8UWkg",
  authDomain: "ded-shop-921c6.firebaseapp.com",
  projectId: "ded-shop-921c6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// UI
const authBox = document.getElementById("authBox");
const cabinet = document.getElementById("cabinet");
const statusText = document.getElementById("status");
const balanceText = document.getElementById("balance");

// REGISTER
window.register = async () => {
  const email = email.value;
  const pass = pass.value;

  try {
    const user = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db, "users", user.user.uid), {
      balance: 0
    });

    statusText.innerText = "Регистрация успешна ✅";
  } catch (e) {
    statusText.innerText = e.message;
  }
};

// LOGIN
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
  } catch (e) {
    statusText.innerText = e.message;
  }
};

// CHECK LOGIN
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authBox.classList.add("hidden");
    cabinet.classList.remove("hidden");

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      balanceText.innerText = snap.data().balance;
    }
  } else {
    authBox.classList.remove("hidden");
    cabinet.classList.add("hidden");
  }
});

// LOGOUT
window.logout = async () => {
  await signOut(auth);
};

// ПОКАЗ БЛОКОВ
window.showPay = () => {
  payBox.classList.toggle("hidden");
};

window.showShop = () => {
  shopBox.classList.toggle("hidden");
};

// ПОПОЛНЕНИЕ (ФЕЙК)
window.pay = async () => {
  const amount = parseInt(document.getElementById("amount").value);

  if (!amount || amount <= 0) return alert("Ошибка суммы");

  const user = auth.currentUser;
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  let newBalance = snap.data().balance + amount;

  await updateDoc(ref, {
    balance: newBalance
  });

  balanceText.innerText = newBalance;
  alert("Оплата прошла ✅");
};

// ПОКУПКА
window.buy = async (price) => {
  const user = auth.currentUser;
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  let bal = snap.data().balance;

  if (bal < price) {
    alert("Недостаточно средств ❌");
    return;
  }

  bal -= price;

  await updateDoc(ref, {
    balance: bal
  });

  balanceText.innerText = bal;
  alert("Покупка успешна ✅");
};

</script>

</body>
</html>
