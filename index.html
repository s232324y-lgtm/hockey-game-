<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Hockey Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #score {
      font-size: 40px;
      margin: 20px 0;
    }

    button {
      background: orange;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🏒 Hockey Game</h1>

  <div id="score">0 : 0</div>

  <button onclick="addGoal1()">+ Гол команда 1</button>
  <button onclick="addGoal2()">+ Гол команда 2</button>
  <br><br>
  <button onclick="resetScore()">Сброс</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

// 🔑 ВСТАВЬ СВОЙ КОНФИГ (у тебя он уже есть)
const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "hockey-game-12834.firebaseapp.com",
  databaseURL: "https://hockey-game-12834-default-rtdb.firebaseio.com/",
  projectId: "hockey-game-12834",
  storageBucket: "hockey-game-12834.appspot.com",
  messagingSenderId: "297111172491",
  appId: "1:297111172491:web:7314083e28aae40b942b8e"
};

// 🚀 Запуск
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 📊 Счёт
let score1 = 0;
let score2 = 0;

// 📡 Слушаем базу
const scoreRef = ref(db, "score/");
onValue(scoreRef, (snapshot) => {
  const data = snapshot.val();
  if (data) {
    score1 = data.team1 || 0;
    score2 = data.team2 || 0;
    updateUI();
  }
});

// 💾 Сохранение
function saveScore() {
  set(scoreRef, {
    team1: score1,
    team2: score2
  });
}

// 🎮 Действия
window.addGoal1 = function() {
  score1++;
  saveScore();
};

window.addGoal2 = function() {
  score2++;
  saveScore();
};

window.resetScore = function() {
  score1 = 0;
  score2 = 0;
  saveScore();
};

// 🎨 Обновление
function updateUI() {
  document.getElementById("score").innerText = score1 + " : " + score2;
}
</script>

</body>
</html>
