<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Аккаунт</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #3b5998, #5f7ecb);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  width: 300px;
  text-align: center;
  color: white;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.reg { background: #4CAF50; color: white; }
.login { background: #4a7dff; color: white; }

#status {
  margin-top: 15px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Аккаунт</h2>

  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Пароль">

  <button class="reg" onclick="register()">Регистрация</button>
  <button class="login" onclick="login()">Войти</button>

  <div id="status"></div>
</div>

<!-- Firebase (НОВАЯ ВЕРСИЯ) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwGSDeMOOyDtLiOPGNED7GiWRK9J8UWkg",
  authDomain: "ded-shop-921c6.firebaseapp.com",
  projectId: "ded-shop-921c6",
  storageBucket: "ded-shop-921c6.appspot.com",
  messagingSenderId: "168352739870",
  appId: "1:168352739870:web:408cbe3cd7afa1df34740f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

window.register = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    setStatus("Регистрация успешна ✅");
  } catch (e) {
    setStatus(e.message);
  }
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    setStatus("Вход выполнен ✅");
  } catch (e) {
    setStatus(e.message);
  }
};
</script>

</body>
</html>
